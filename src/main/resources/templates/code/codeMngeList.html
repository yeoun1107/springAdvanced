	File Description	: 코드 관리 화면 (외부 CSS 및 공통 컴포넌트 기반)

	EditHistory			: 2026-03-18 인라인 스타일 제거, 외부 CSS 및 base.css 공통 클래스 적용

<!DOCTYPE html>
<html lang="ko" 
      xmlns:th="http://www.thymeleaf.org"
      xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
      layout:decorate="~{layout/layout}">

<!-- 페이지 전용 CSS 추가 -->
<th:block layout:fragment="css">
    <link rel="stylesheet" th:href="@{/css/code/code.css}">
</th:block>

<th:block layout:fragment="content">
    <div class="dashboard-header mb-4">
        <h2>코드 관리</h2>
        <p>시스템 공통 코드를 목록 하단에서 즉시 추가하고 수정할 수 있습니다.</p>
    </div>

    <div class="master-detail-wrapper">
        <!-- 1. 코드 그룹 영역 (Master) -->
        <div class="master-area">
            <div class="card code-card">
                <div class="info-card-header mb-4">
                    <h3 class="mb-0">코드그룹</h3>
                </div>
                
                <!-- 그룹 검색 -->
                <div class="code-search-box">
                    <input type="text" class="form-control" id="searchGroupNm" placeholder="그룹코드 또는 그룹명으로 검색하세요">
                    <button type="button" class="btn-auth" id="btnSearchGroup">검색</button>
                </div>

                <!-- 그룹 목록 테이블 -->
                <div class="table-scroll-box">
                    <table class="table-custom">
                        <thead>
                            <tr>
                                <th>그룹코드</th>
                                <th>그룹명</th>
                                <th class="text-center">수정/삭제</th>
                            </tr>
                        </thead>
                        <tbody id="groupListBody">
                            <!-- JS에서 동적 생성 -->
                        </tbody>
                    </table>
                </div>

                <!-- 그룹 입력/수정 폼 -->
                <div class="form-inline-box">
                    <h4 id="groupFormTitle" class="mb-4 fw-bold text-primary">신규 그룹 추가</h4>
                    <form id="groupForm">
                        <div class="form-grid form-grid-2">
                            <div class="form-group mb-0">
                                <label class="mb-2">그룹 코드</label>
                                <input type="text" class="form-control" id="groupCd" name="groupCd" placeholder="e.g. REGN_CD">
                            </div>
                            <div class="form-group mb-0">
                                <label class="mb-2">그룹명</label>
                                <input type="text" class="form-control" id="groupNm" name="groupNm" placeholder="e.g. 지역코드">
                            </div>
                        </div>
                        <div class="form-group mb-4">
                            <label class="mb-2">그룹상세</label>
                            <input type="text" class="form-control" id="groupDesc" name="groupDesc" placeholder="지역코드를 관리하는 그룹입니다.">
                        </div>
                        <div class="form-actions-right">
                            <button type="button" class="btn-auth bg-secondary" id="btnResetGroup">초기화</button>
                            <button type="button" class="btn-auth" id="btnSaveGroup">저장</button>
                        </div>
                    </form>
                </div>
            </div>
        </div>

        <!-- 2. 상세 코드 영역 (Detail) -->
        <div class="detail-area">
            <div class="card code-card" id="detailCardWrapper">
                <!-- 상세 코드 콘텐츠 -->
                <div id="detailCard" class="d-none" style="flex: 1; display: flex; flex-direction: column;">
                    <div class="info-card-header mb-4">
                        <h3 class="mb-0">[<span id="selectedGroupName" class="text-primary"></span>] 상세</h3>
                    </div>

                    <!-- 상세 목록 테이블 -->
                    <div class="table-scroll-box">
                        <table class="table-custom">
                            <thead>
                                <tr>
                                    <th>코드</th>
                                    <th>코드명</th>
                                    <th>정렬순서</th>
                                    <th class="text-center">수정/삭제</th>
                                </tr>
                            </thead>
                            <tbody id="detailListBody">
                                <!-- JS에서 동적 생성 -->
                            </tbody>
                        </table>
                    </div>

                    <!-- 상세 입력/수정 폼 -->
                    <div class="form-inline-box">
                        <h4 id="detailFormTitle" class="mb-4 fw-bold text-success">신규 코드 추가</h4>
                        <form id="detailForm">
                            <div class="form-grid form-grid-3">
                                <div class="form-group mb-0">
                                    <label class="mb-2">코드</label>
                                    <input type="text" class="form-control" id="detailCd" name="detailCd" placeholder="e.g. A">
                                </div>
                                <div class="form-group mb-0">
                                    <label class="mb-2">코드명</label>
                                    <input type="text" class="form-control" id="codeNm" name="codeNm" placeholder="e.g. 서울특별시">
                                </div>
                                <div class="form-group mb-0">
                                    <label class="mb-2">정렬순서</label>
                                    <input type="number" class="form-control" id="sortOrder" name="sortOrder" value="1">
                                </div>
                            </div>
                            <div class="form-group mb-4">
                                <label class="mb-2">코드상세</label>
                                <input type="text" class="form-control" id="codeDesc" name="codeDesc" placeholder="서울특별시">
                            </div>
                            <div class="form-actions-right">
                                <button type="button" class="btn-auth bg-secondary" id="btnResetDetail">초기화</button>
                                <button type="button" class="btn-auth bg-success" id="btnSaveDetail">저장</button>
                            </div>
                        </form>
                    </div>
                </div>
                
                <!-- 그룹 미선택 시 안내 메시지 -->
                <div id="noSelectionMsg" class="empty-state-box">
                    <div class="empty-state-icon">📂</div>
                    <p class="text-secondary fw-semibold">코드의 세부적인 관리를 위해<br>좌측에서 해당하는 그룹을 선택해주세요.</p>
                </div>
            </div>
        </div>
    </div>
</th:block>

<th:block layout:fragment="script">
    <script th:src="@{/js/code/codeMngeList.js}"></script>
</th:block>
</html>
