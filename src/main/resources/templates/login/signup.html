<!DOCTYPE html>
<html lang="ko" xmlns:th="http://www.thymeleaf.org">
<head>
	<meta charset="UTF-8">
	<meta name="viewport" content="width=device-width, initial-scale=1.0">
	<title>Sign Up - Study Spring</title>
	<!-- Google Fonts for modern typography -->
	<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
	<link rel="stylesheet" th:href="@{/css/common.css}">
</head>
<body class="auth-body">
	<div class="auth-card">
		<div class="auth-header">
			<h1>계정 생성</h1>
			<p>Join us and start your journey with Study Spring.</p>
		</div>
		<form id="signupForm">
			<div class="form-group">
				<label for="userId">아이디</label>
				<input type="text" id="userId" name="userId" class="form-control" placeholder="ID를 입력하세요" required>
				<div id="userIdFeedback" class="feedback-msg"></div>
			</div>
			<div class="form-group">
				<label for="password">비밀번호</label>
				<input type="password" id="password" name="password" class="form-control" placeholder="비밀번호를 입력하세요" required>
			</div>
			<div class="form-group">
				<label for="confirmPassword">비밀번호 확인</label>
				<input type="password" id="confirmPassword" name="confirmPassword" class="form-control" placeholder="비밀번호를 한 번 더 입력하세요" required>
				<div id="passwordFeedback" class="feedback-msg"></div>
			</div>
			<button type="button" id="btnRegister" class="btn-auth">회원가입</button>
		</form>
		<div class="auth-footer">
			이미 계정이 있으신가요? <a th:href="@{/login}">로그인</a>
		</div>
	</div>

	<!-- Scripts -->
	<script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>
	<script th:src="@{/js/commUtil.js}"></script>
	<script th:src="@{/js/login/signup.js}"></script>
</body>
</html>
